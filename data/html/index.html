<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/estilos.css">
    <title>Página de inicio PEPPE</title>
</head>
<body>
    <div id="header">
        <h2>Selecciona tu rol</h2>
    </div>
    <div class="container">
        <button onclick="mostrarLogin()">Docente</button>
        <div id="login" style="display: none;">
            <form id="loginform" onsubmit="return verificarPasswd(event)">
                <label for="password">Contraseña</label>
                <input id="password" type="password" placeholder="Contraseña" name="password" required>
                <button type="submit" title="Ingresar" name="Ingresar">Login</button>
            </form>
        </div>
        <button onclick="window.location.href = 'panelEstudiante.html'">Estudiante</button>
    </div>
    <div style="border:lightslategrey;">
        <div id="footer">
            <p>&copy; 2025. ISPM Nro.1. Departamento de Investigación. Técnicatura Superior en Automatización y Robótica.</p>
        </div>
    </div>
    <script>
        /* ----------------------------------------------------------------
           Selección de rol — SIN comunicación con la ESP32.
           No hace falta: la contraseña de docente es solo para que un
           estudiante no entre por accidente a los controles, no seguridad
           real (no hay datos sensibles en juego). Si en el futuro alguna
           vez hace falta cambiarla, es esta única constante.

           Si la ESP32 ya tiene 3 conexiones activas, el rechazo pasa
           cuando panelDocente.html/panelEstudiante.html intenten abrir
           su propio WebSocket — no hace falta consultarlo antes acá.
        ---------------------------------------------------------------- */
        const CONTRASENA_DOCENTE = "123456789";

        function mostrarLogin() {
            document.getElementById("login").style.display = "block";
        }

        function verificarPasswd(event) {
            event.preventDefault();
            const password = document.getElementById("password").value;

            if (password === CONTRASENA_DOCENTE) {
                window.location.href = 'panelDocente.html';
            } else {
                alert("Contraseña incorrecta");
            }
        }
    </script>
</body>
</html>
