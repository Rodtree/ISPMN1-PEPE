; PlatformIO Project Configuration File
; PEPE (PEPPE) - Proyecto Experiencial Para Prácticas de Enfermería
; Firmware para ESP32: servidor web + control de sensores/animaciones

[env:esp32]
platform = espressif32
board = esp32dev            ; TODO: confirmar modelo exacto de placa ESP32 usada
framework = arduino
monitor_speed = 115200

; El esquema de particiones por defecto reserva la mitad del flash para OTA
; (dos particiones de firmware de ~1.31MB cada una) -- con eso la app ya
; estaba al 80% de uso y casi sin margen para crecer. Este proyecto no usa
; actualización OTA, así que "huge_app.csv" (una sola partición de ~3MB
; para la app, sin duplicar, y ~1MB para SPIFFS) libera mucho más espacio.
; Tu carpeta data/ pesa ~484KB, entra de sobra en el MB que le queda a SPIFFS.
; Si en algún momento agregás OTA, hay que volver al esquema "default.csv".
board_build.partitions = huge_app.csv

lib_deps =
    links2004/WebSockets @ ^2.6.1
    bblanchon/ArduinoJson
    adafruit/Adafruit_VL6180X
    bodmer/TFT_eSPI

; TFT_eSPI: antes se dejaba la configuración por defecto de la librería
; (User_Setup.h, pensada para ESP8266 con pines PIN_D3/D4/D5/D6/D7), y
; ojo_config.h solo pisaba los #define de los PINES -- pero el DRIVER
; (GC9A01) nunca se seleccionaba, así que compilaba contra el chip por
; defecto de la librería (no GC9A01). Se resuelve con USER_SETUP_LOADED=1,
; que le dice a TFT_eSPI que no cargue su User_Setup.h propio, y se define
; todo acá. CS no se define (queda en -1): este proyecto controla el CS de
; cada display a mano con digitalWrite() en drawEye(), TFT_eSPI no lo toca.
; TOUCH_CS=-1: no hay pantalla táctil, esto silencia el warning del build
; que decía "TOUCH_CS pin not defined".
build_flags =
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER=1
    -D TFT_CS=-1
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_MISO=-1
    -D TOUCH_CS=-1
    -D SPI_FREQUENCY=27000000

; La carpeta data/ (paneles HTML/CSS/JS) se sube aparte con:
;   pio run --target uploadfs